<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1330"/>
      <stop offset="100%" stop-color="#0e0a1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="#a259ff" filter="url(#glow)">We'll Be Right Back</text>
  <text x="960" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" fill="#b9b9d0">Intermission</text>
  <line x1="760" y1="510" x2="1160" y2="510" stroke="#a259ff" stroke-width="2" opacity="0.4"/>
</svg>
